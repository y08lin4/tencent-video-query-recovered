name: Build Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-go-exe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows EXE
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/tencent-video-query-windows-amd64.exe ./examples/go

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: tencent-video-query-windows-amd64
          path: dist/tencent-video-query-windows-amd64.exe

  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: gradle -p android assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tencent-video-query-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
